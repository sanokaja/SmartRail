<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — SmartRail</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Lato', sans-serif;
            background: linear-gradient(135deg, #f59e0b 0%, #ea580c 100%);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 20px 0;
        }

        /* identical to .booking-container */
        .login-container {
            max-width: 440px;
            width: 100%;
            margin: 30px auto;
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        /* identical to .booking-header */
        .login-header {
            text-align: center;
            margin-bottom: 32px;
            padding-bottom: 20px;
            border-bottom: 3px solid #f59e0b;
        }
        .login-header .icon {
            font-size: 42px; margin-bottom: 12px;
        }
        .login-header h2 {
            color: #f59e0b; font-weight: 700; font-size: 22px;
        }
        .login-header p { color: #999; font-size: 13px; margin-top: 4px; }

        /* flash — same as journey-details */
        .flash {
            background: #ffebee;
            border-left: 5px solid #f44336;
            padding: 12px 16px; border-radius: 10px;
            margin-bottom: 20px;
            font-size: 13px; font-weight: 700; color: #c62828;
        }

        .form-group { margin-bottom: 20px; }
        .form-group label {
            font-weight: 600; color: #333;
            margin-bottom: 8px; display: block; font-size: 14px;
        }
        .form-group input {
            width: 100%; padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px; font-family: 'Lato', sans-serif;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #f59e0b;
            box-shadow: 0 0 0 0.2rem rgba(245,158,11,0.25);
        }

        /* identical to .proceed-btn */
        .btn-login {
            width: 100%; padding: 18px;
            background: linear-gradient(135deg, #f59e0b 0%, #ea580c 100%);
            color: white; border: none;
            border-radius: 10px;
            font-size: 18px; font-weight: 700;
            cursor: pointer; font-family: 'Lato', sans-serif;
            transition: transform 0.3s;
        }
        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(245,158,11,0.4);
        }

        /* identical to .back-link */
        .setup-link {
            display: block; text-align: center; margin-top: 18px;
            color: #f59e0b; text-decoration: none;
            font-weight: 600; font-size: 13px;
        }
        .setup-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="login-container">
    <div class="login-header">
        <div class="icon">🚂</div>
        <h2>SmartRail Admin</h2>
        <p>Government / Admin Portal</p>
    </div>

    {% with messages = get_flashed_messages() %}
        {% if messages %}{% for m in messages %}
        <div class="flash"><i class="fas fa-exclamation-circle"></i> {{ m }}</div>
        {% endfor %}{% endif %}
    {% endwith %}

    <form method="POST">
        <div class="form-group">
            <label><i class="fas fa-user"></i> Username</label>
            <input type="text" name="username" placeholder="Enter username" required autofocus>
        </div>
        <div class="form-group">
            <label><i class="fas fa-lock"></i> Password</label>
            <input type="password" name="password" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn-login">
            <i class="fas fa-sign-in-alt"></i> &nbsp; Sign In
        </button>
    </form>

    <a href="{{ url_for('admin.admin_setup') }}" class="setup-link">
        First time? Create admin account →
    </a>
</div>
</body>
</html>
