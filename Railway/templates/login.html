<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - RAILWAY RESERVATION</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='login.css') }}"
    />
    <style>
      .form-check {
        margin: 15px 0;
      }
      
      .forgot-password {
        float: right;
        color: #667eea;
        text-decoration: none;
        font-size: 14px;
      }
      
      .forgot-password:hover {
        text-decoration: underline;
      }
      
      .remember-me {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      
      .login-options {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin: 15px 0;
      }
    </style>
  </head>
  <body>
    <form id="login-form" method="POST" action="{{url_for('main.login')}}">
      <div class="container mt-5">
        <h1 class="text-center mb-4"><i class="fas fa-sign-in-alt"></i> Login</h1>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ 'danger' if category == 'error' else 'info' }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <div class="col-md-12">
          <label for="username" class="form-label"><i class="fas fa-user"></i> Username</label>
          <input type="text" class="form-control" name="username" id="username" required />
        </div>

        <div class="col-md-12">
          <label for="password" class="form-label"><i class="fas fa-lock"></i> Password</label>
          <div class="input-group">
            <input type="password" class="form-control" id="password" name="password" required />
            <button class="btn btn-outline-secondary" type="button" onclick="togglePassword()">
              <i class="fas fa-eye" id="toggleIcon"></i>
            </button>
          </div>
        </div>

        <div class="login-options">
          <div class="form-check remember-me">
            <input class="form-check-input" type="checkbox" id="rememberMe" name="remember_me">
            <label class="form-check-label" for="rememberMe">
              Remember me
            </label>
          </div>
          <a href="{{ url_for('main.forgot_password') }}" class="forgot-password">
            Forgot Password?
          </a>
        </div>

        <button id="submit-btn" type="submit" class="btn btn-primary w-100">
          <i class="fas fa-sign-in-alt"></i> Login
        </button>

        <div class="text-center mt-3">
          <p>Don't have an account? 
            <a href="{{ url_for('main.register') }}" style="color: #667eea; font-weight: 600;">
              Register now
            </a>
          </p>
        </div>
      </div>
    </form>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      function togglePassword() {
        const passwordInput = document.getElementById('password');
        const toggleIcon = document.getElementById('toggleIcon');
        
        if (passwordInput.type === 'password') {
          passwordInput.type = 'text';
          toggleIcon.classList.remove('fa-eye');
          toggleIcon.classList.add('fa-eye-slash');
        } else {
          passwordInput.type = 'password';
          toggleIcon.classList.remove('fa-eye-slash');
          toggleIcon.classList.add('fa-eye');
        }
      }

      // Check if username was saved
      window.addEventListener('DOMContentLoaded', function() {
        const savedUsername = localStorage.getItem('remembered_username');
        if (savedUsername) {
          document.getElementById('username').value = savedUsername;
          document.getElementById('rememberMe').checked = true;
        }
      });

      // Save username if remember me is checked
      document.getElementById('login-form').addEventListener('submit', function() {
        const rememberMe = document.getElementById('rememberMe').checked;
        const username = document.getElementById('username').value;
        
        if (rememberMe) {
          localStorage.setItem('remembered_username', username);
        } else {
          localStorage.removeItem('remembered_username');
        }
      });
    </script>
  </body>
</html>
